[phases.build]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction"]

[phases.deploy]
cmds = ["php artisan storage:link --force", "php artisan migrate --force", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
