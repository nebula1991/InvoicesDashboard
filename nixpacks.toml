[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.tokenizer", "php84Extensions.fileinfo", "composer"]

[phases.build]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction"]

[phases.deploy]
cmds = ["php artisan storage:link --force", "php artisan migrate --force", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
